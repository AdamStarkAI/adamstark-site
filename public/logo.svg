<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00ff88" stroke-width="0.5" opacity="0.05"/>
    </pattern>
    <filter id="sharpglow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="#0d0f12"/>
  <rect width="800" height="800" fill="url(#grid)"/>

  <!-- Hexagon -->
  <polygon points="400,155 490,206 490,308 400,359 310,308 310,206"
           fill="none" stroke="#00ff88" stroke-width="2" opacity="0.9" filter="url(#sharpglow)"/>
  <polygon points="400,173 472,216 472,299 400,342 328,299 328,216"
           fill="#00ff88" opacity="0.04"/>

  <!-- A monogram — no glow, crisp -->
  <text x="400" y="290"
        font-family="Arial Black, sans-serif"
        font-size="120"
        font-weight="900"
        fill="#00ff88"
        text-anchor="middle"
        dominant-baseline="middle"
        opacity="1">A</text>

  <!-- Thin separator line -->
  <rect x="180" y="415" width="440" height="1.5" fill="#00ff88" opacity="0.3"/>

  <!-- THE STARK REPORT — unified letter spacing -->
  <text x="400" y="480"
        font-family="Arial, Helvetica, sans-serif"
        font-size="52"
        font-weight="900"
        fill="#ffffff"
        text-anchor="middle"
        letter-spacing="10">THE STARK</text>

  <text x="400" y="545"
        font-family="Arial, Helvetica, sans-serif"
        font-size="52"
        font-weight="900"
        fill="#00ff88"
        text-anchor="middle"
        letter-spacing="10"
        filter="url(#sharpglow)">REPORT</text>

  <!-- Tagline -->
  <text x="400" y="630"
        font-family="Arial, Helvetica, sans-serif"
        font-size="15"
        font-weight="400"
        fill="#ffffff"
        text-anchor="middle"
        letter-spacing="5"
        opacity="0.3">BUILDING IN PUBLIC · REAL NUMBERS</text>

</svg>
